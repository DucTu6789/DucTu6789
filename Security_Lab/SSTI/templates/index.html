<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Feedback Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7fe;
            font-family: 'Inter', sans-serif;
            color: #1e293b;
        }
        .container {
            max-width: 650px;
            margin-top: 50px;
        }
        .main-header {
            font-weight: 800;
            color: #4f46e5;
            letter-spacing: -1px;
            margin-bottom: 30px;
        }
        .card {
            border: none;
            border-radius: 16px;
            background: #ffffff;
        }
        .form-control {
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 12px;
            transition: all 0.2s;
        }
        .form-control:focus {
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
            border-color: #4f46e5;
        }
        .btn-primary {
            background-color: #4f46e5;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-primary:hover {
            background-color: #4338ca;
            transform: translateY(-1px);
        }
        .comment-card {
            background: #ffffff;
            border-radius: 12px;
            border-left: 5px solid #4f46e5;
            transition: 0.2s;
        }
        .comment-card:hover {
            transform: scale(1.01);
        }
        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            object-fit: cover;
        }
        .comment-content {
            padding-left: 60px;
            color: #475569;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .section-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin: 40px 0 20px 0;
            display: flex;
            align-items: center;
        }
        .section-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #e2e8f0;
            margin-left: 15px;
        }
    </style>
</head>
<body>

<div class="container pb-5">
    <div class="text-center">
        <h1 class="main-header">Nexus Feedback</h1>
    </div>

    <div class="card p-4 shadow-sm mb-2">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label small fw-bold">Tên của bạn</label>
                <input name="name" class="form-control" placeholder="Nhập tên..." required>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold">Lời nhắn</label>
                <textarea name="message" class="form-control" rows="3" placeholder="Viết phản hồi tại đây..." required></textarea>
            </div>
            <button class="btn btn-primary w-100 shadow-sm">Gửi ý kiến</button>
        </form>
    </div>

    <h5 class="section-title text-muted">Bình luận gần đây</h5>

    <div class="comments-wrapper">
        {{ comments_list }}
    </div>
</div>

</body>
</html>
